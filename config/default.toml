# ═══════════════════════════════════════════════════════════════
#  Swarm Orchestrator — Default Configuration
#  Part of N.O.M.A.D. Swarm Intelligence
# ═══════════════════════════════════════════════════════════════

[node]
id = "__NODE_ID__"
name = "__NODE_NAME__"
domain = "__DOMAIN__"

[matrix]
homeserver_url = "http://conduit:6167"
server_name = "__DOMAIN__"
room_alias = "#swarm-deliberation:__DOMAIN__"
user_id = "@orchestrator:__DOMAIN__"
password = ""  # Set via MATRIX_ORCHESTRATOR_PASSWORD env var

[ai]
llm_model = "__LLM_MODEL__"
embedding_model = "__EMBEDDING_MODEL__"
ollama_url = "http://ollama:11434"
qdrant_url = "http://qdrant:6333"
qdrant_collection = "swarm_memory"
temperature = 0.3
max_tokens = 2048

[federation]
gotosocial_url = "http://gotosocial:8080"
protocol = "https"
access_token = ""  # Set via GOTOSOCIAL_ACCESS_TOKEN env var

[rounds]
mode = "__ROUND_MODE__"
interval_seconds = __ROUND_INTERVAL__
message_threshold = __MESSAGE_THRESHOLD__

[security]
key_path = "/data/keys/node.key"
public_key_path = "/data/keys/node.pub"
# Users allowed to trigger !summarize (empty array = allow all room members)
allowed_trigger_users = []

[logging]
level = "info"

[web]
enabled = true
host = "0.0.0.0"
port = 8080
# Bearer token for control endpoints. Sourced from WEB_API_TOKEN env var
# when empty here; leave empty to disable /rounds/trigger and other mutating
# endpoints entirely.
api_token = ""
# CORS origins for browser clients served from a different origin.
# Leave empty to allow only same-origin requests.
cors_origins = []
