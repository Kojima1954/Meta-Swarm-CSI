# ═══════════════════════════════════════════════════════════════
#  Swarm Orchestrator — Default Configuration
#  Part of N.O.M.A.D. Swarm Intelligence
# ═══════════════════════════════════════════════════════════════

[node]
id = "__NODE_ID__"
name = "__NODE_NAME__"
domain = "__DOMAIN__"

[matrix]
homeserver_url = "http://conduit:6167"
server_name = "__DOMAIN__"
room_alias = "#swarm-deliberation:__DOMAIN__"

[ai]
llm_model = "__LLM_MODEL__"
embedding_model = "__EMBEDDING_MODEL__"
ollama_url = "http://ollama:11434"
qdrant_url = "http://qdrant:6333"
qdrant_collection = "swarm_memory"

[federation]
gotosocial_url = "http://gotosocial:8080"
protocol = "https"

[rounds]
mode = "__ROUND_MODE__"
interval_seconds = __ROUND_INTERVAL__
message_threshold = __MESSAGE_THRESHOLD__

[security]
key_path = "/data/keys/node.key"
public_key_path = "/data/keys/node.pub"

[logging]
level = "info"
