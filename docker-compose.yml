# ═══════════════════════════════════════════════════════════════
#  N.O.M.A.D. Swarm Intelligence — Companion Stack
# ═══════════════════════════════════════════════════════════════
# Prerequisite: Project N.O.M.A.D. running at /opt/project-nomad
#
# Usage:
#   docker compose up -d                          # NOMAD manages Ollama/Qdrant
#   docker compose --profile self-managed up -d   # We manage Ollama/Qdrant

services:

  # ─── Self-Managed AI Services (activated via profile) ──────

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    profiles: ["self-managed"]
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      # Keep models loaded in memory across requests.  Without this, a
      # container restart unloads the model and the next request takes
      # 10-30 s while it reloads.  Set to "-1" (infinite) for CPU-only
      # deployments where memory is plentiful, or a duration like "30m".
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - swarm
      - nomad
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    restart: unless-stopped
    profiles: ["self-managed"]
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - swarm
      - nomad
    security_opt:
      - no-new-privileges:true

  # ─── Matrix Homeserver ─────────────────────────────────────

  # Matrix Conduit homeserver.  conduwuit (ghcr.io/girlbossceo/conduwuit)
  # is a drop-in, more actively maintained community fork — change
  # CONDUIT_IMAGE in .env to switch.
  conduit:
    image: ${CONDUIT_IMAGE:-matrixconduit/matrix-conduit:latest}
    restart: unless-stopped
    volumes:
      - conduit-data:/var/lib/matrix-conduit
      - ./config/conduit/conduit.toml:/etc/conduit/conduit.toml:ro
    environment:
      CONDUIT_CONFIG: /etc/conduit/conduit.toml
    networks:
      - swarm
      - nomad
    security_opt:
      - no-new-privileges:true

  # ─── Matrix Web Client ────────────────────────────────────

  element-web:
    image: ${ELEMENT_IMAGE:-vectorim/element-web:latest}
    restart: unless-stopped
    read_only: true
    volumes:
      - ./config/element/config.json:/app/config.json:ro
    networks:
      - swarm
    security_opt:
      - no-new-privileges:true

  # ─── Fediverse / ActivityPub ───────────────────────────────

  gotosocial:
    image: ${GOTOSOCIAL_IMAGE:-superseriousbusiness/gotosocial:0.21.2}
    restart: unless-stopped
    volumes:
      - gotosocial-data:/gotosocial/storage
      - ./config/gotosocial/config.yaml:/gotosocial/config.yaml:ro
    environment:
      GTS_CONFIG_PATH: /gotosocial/config.yaml
    networks:
      - swarm
    security_opt:
      - no-new-privileges:true

  # ─── Reverse Proxy + TLS ──────────────────────────────────

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - conduit
      - element-web
      - gotosocial
    networks:
      - swarm
    security_opt:
      - no-new-privileges:true

  # ─── TLS Certificate Manager ──────────────────────────────

  certbot:
    image: certbot/certbot:latest
    profiles: ["tls"]
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot

  # ─── The Swarm Orchestrator (custom Python app) ────────────

  swarm-orchestrator:
    build: ./swarm-orchestrator
    restart: unless-stopped
    volumes:
      - orchestrator-data:/data
      - ./config/default.toml:/etc/orchestrator/config.toml:ro
      - ./config/topology.toml:/etc/orchestrator/topology.toml:ro
      - ./data/keys:/data/keys:ro
    depends_on:
      - conduit
      - gotosocial
    networks:
      - swarm
      - nomad
    security_opt:
      - no-new-privileges:true

volumes:
  ollama-data:
  qdrant-data:
  conduit-data:
  gotosocial-data:
  orchestrator-data:
  certbot-etc:
  certbot-var:
  certbot-www:

networks:
  swarm:
    driver: bridge
  nomad:
    external: true
    name: ${NOMAD_NETWORK:-project-nomad_default}
